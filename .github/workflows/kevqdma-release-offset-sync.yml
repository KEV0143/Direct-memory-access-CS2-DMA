name: KevqDMA Release Offset Sync

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update x64/Release/output"
        required: false
        default: "false"
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write

concurrency:
  group: kevqdma-release-offset-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      UPSTREAM_OWNER: a2x
      UPSTREAM_REPO: cs2-dumper
      TARGET_DIR: x64/Release/output
      LOCAL_INFO: x64/Release/output/info.json

    steps:
      - name: Checkout KevqDMA repository
        uses: actions/checkout@v5

      - name: Resolve newest cs2-dumper output
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          upstream_owner = os.environ["UPSTREAM_OWNER"]
          upstream_repo = os.environ["UPSTREAM_REPO"]
          target_dir = Path(os.environ["TARGET_DIR"])
          local_info = Path(os.environ["LOCAL_INFO"])
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          token = os.environ.get("GH_TOKEN", "")
          force = os.environ.get("FORCE", "false").lower() == "true"

          def api_get_json(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "KevqDMA-Release-Offset-Sync",
                  },
              )

              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.loads(response.read().decode("utf-8"))

          def raw_url(repo_full_name, ref, path):
              repo_full_name = repo_full_name.strip("/")
              encoded_ref = urllib.parse.quote(ref, safe="")
              encoded_path = urllib.parse.quote(path, safe="/")
              return f"https://raw.githubusercontent.com/{repo_full_name}/{encoded_ref}/{encoded_path}"

          def fetch_raw(repo_full_name, ref, path):
              url = raw_url(repo_full_name, ref, path)
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "KevqDMA-Release-Offset-Sync",
                  },
              )

              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      return response.read()
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return None
                  raise

          def fetch_info(repo_full_name, ref):
              data = fetch_raw(repo_full_name, ref, "output/info.json")

              if not data:
                  return None

              try:
                  return json.loads(data.decode("utf-8"))
              except Exception:
                  return None

          def parse_timestamp(value):
              if not value:
                  return None

              value = value.replace("Z", "+00:00")
              dt = datetime.fromisoformat(value)

              if dt.tzinfo is None:
                  dt = dt.replace(tzinfo=timezone.utc)

              return dt

          def is_newer(left, right):
              left_dt = parse_timestamp(left)
              right_dt = parse_timestamp(right)

              if left_dt is None:
                  return False

              if right_dt is None:
                  return True

              return left_dt > right_dt

          def format_update_time(timestamp):
              dt = parse_timestamp(timestamp)

              if dt is None:
                  dt = datetime.now(timezone.utc)

              return dt.strftime("%d.%m.%Y %H:%M")

          def write_output(name, value):
              with github_output.open("a", encoding="utf-8") as file:
                  file.write(f"{name}={value}\n")

          local_ts = ""

          if local_info.exists():
              try:
                  local_ts = json.loads(local_info.read_text(encoding="utf-8")).get("timestamp", "")
              except Exception:
                  local_ts = ""

          print(f"Local timestamp: {local_ts or 'none'}")

          main_repo = f"{upstream_owner}/{upstream_repo}"
          main_info = fetch_info(main_repo, "main")

          if not main_info:
              raise RuntimeError("Cannot read output/info.json from a2x/cs2-dumper main")

          best_repo = main_repo
          best_ref = "main"
          best_label = "main"
          best_ts = main_info.get("timestamp", "")

          print(f"main timestamp: {best_ts or 'none'}")

          pulls_url = f"https://api.github.com/repos/{main_repo}/pulls?state=open&per_page=100"
          page = 1

          while True:
              pulls = api_get_json(f"{pulls_url}&page={page}")

              if not pulls:
                  break

              for pr in pulls:
                  pr_number = pr.get("number")
                  head = pr.get("head") or {}
                  head_repo = head.get("repo") or {}
                  head_repo_full_name = head_repo.get("full_name")
                  head_sha = head.get("sha")

                  if not pr_number or not head_repo_full_name or not head_sha:
                      continue

                  pr_label = f"PR #{pr_number}"
                  pr_info = fetch_info(head_repo_full_name, head_sha)

                  if not pr_info:
                      print(f"{pr_label}: no output/info.json found")
                      continue

                  pr_ts = pr_info.get("timestamp", "")

                  if not pr_ts:
                      print(f"{pr_label}: empty timestamp")
                      continue

                  print(f"{pr_label} timestamp: {pr_ts}")

                  if is_newer(pr_ts, best_ts):
                      best_repo = head_repo_full_name
                      best_ref = head_sha
                      best_label = pr_label
                      best_ts = pr_ts

              if len(pulls) < 100:
                  break

              page += 1

          should_sync = False

          if force:
              should_sync = True
          elif not target_dir.exists() or not local_info.exists():
              should_sync = True
          elif is_newer(best_ts, local_ts):
              should_sync = True

          update_time = format_update_time(best_ts)

          print(f"Best source: {best_label}")
          print(f"Best repository: {best_repo}")
          print(f"Best ref: {best_ref}")
          print(f"Best timestamp: {best_ts or 'none'}")
          print(f"Should sync: {str(should_sync).lower()}")

          write_output("should_sync", str(should_sync).lower())
          write_output("best_repo", best_repo)
          write_output("best_ref", best_ref)
          write_output("best_label", best_label)
          write_output("best_ts", best_ts)
          write_output("update_time", update_time)
          PY

      - name: Download selected offset files
        if: steps.resolve.outputs.should_sync == 'true'
        shell: bash
        env:
          BEST_REPO: ${{ steps.resolve.outputs.best_repo }}
          BEST_REF: ${{ steps.resolve.outputs.best_ref }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import os
          import shutil
          import urllib.parse
          import urllib.request
          from pathlib import Path

          target_dir = Path(os.environ["TARGET_DIR"])
          best_repo = os.environ["BEST_REPO"].strip("/")
          best_ref = os.environ["BEST_REF"]

          files = [
              "client_dll.hpp",
              "offsets.hpp",
              "info.json",
          ]

          def raw_url(repo_full_name, ref, path):
              encoded_ref = urllib.parse.quote(ref, safe="")
              encoded_path = urllib.parse.quote(path, safe="/")
              return f"https://raw.githubusercontent.com/{repo_full_name}/{encoded_ref}/{encoded_path}"

          def download(path):
              url = raw_url(best_repo, best_ref, f"output/{path}")
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "KevqDMA-Release-Offset-Sync",
                  },
              )

              with urllib.request.urlopen(request, timeout=20) as response:
                  return response.read()

          if target_dir.exists():
              shutil.rmtree(target_dir)

          target_dir.mkdir(parents=True, exist_ok=True)

          for name in files:
              data = download(name)
              destination = target_dir / name
              destination.write_bytes(data)
              print(f"Downloaded {name} -> {destination}")
          PY

      - name: Commit and push release offset update
        if: steps.resolve.outputs.should_sync == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A -f "$TARGET_DIR"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit \
            -m "Release Offset Update ${{ steps.resolve.outputs.update_time }}" \
            -m "Source: ${{ steps.resolve.outputs.best_label }}" \
            -m "Repository: ${{ steps.resolve.outputs.best_repo }}" \
            -m "Timestamp: ${{ steps.resolve.outputs.best_ts }}"

          git push

      - name: No update
        if: steps.resolve.outputs.should_sync != 'true'
        run: echo "No newer cs2-dumper output found."
